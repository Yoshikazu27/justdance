<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Dance Now - Songs List</title>
    <link rel="icon" href="assets/files/ChiquiChafa.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <div class="filter-bar">
      <input type="text" id="txt-filter" autocomplete="off" />
      <button id="btn-search">
        <i class="fa fa-search"></i>
      </button>
    </div>
    <div id="main-container"></div>
    <div id="paginator">
    </div>

    <div id="preview-modal">
      <div class="modal-content">
        <h1 id="name-title"></h1>
        <h2 id="artist-title"></h2>
        <video id="video-preview"></video>
        <div id="modal-button-div">
          <button id="btn-close">Close</button>
        </div>
      </div>
    </div>

    <script src="assets/js/songs.js"></script>
  </body>
</html>
